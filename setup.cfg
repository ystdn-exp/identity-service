[flake8]
max-line-length = 90
extend-ignore = E203, W503, E501
exclude =
    .git,
    __pycache__,
    .ruff_cache,
    .venv,
    venv,
    env,
    .env,
    node_modules,
    .pytest_cache,
    .mypy_cache,
    migrations,
    build,
    dist,
    *.egg-info
per-file-ignores =
    __init__.py:F401
    migrations/*:E501
max-complexity = 10
select = C,E,F,W,B,B950
